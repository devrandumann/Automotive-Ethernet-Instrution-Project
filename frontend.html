<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automotive IDS Dashboard</title>
    <style>
        /* --- CSS VARIABLES (THEMING) --- */
        
        :root {
            --bg-color: #f0f2f5;          
            --card-bg: #ffffff;           
            --text-color: #333333;        
            --label-color: #666666;
            --input-bg: #ffffff;
            --input-border: #cccccc;
            --input-text: #333333;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        /* Dark Mode  */
        .dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --label-color: #aaaaaa;
            --input-bg: #2c2c2c;
            --input-border: #444444;
            --input-text: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.3s, color 0.3s; /* Geçiş animasyonu */
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            position: relative;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-color);
            transition: transform 0.3s;
        }
        .theme-toggle:hover { transform: rotate(20deg); }

        h2 { margin-top: 0; margin-bottom: 1.5rem; text-align: center; color: #3d9dfc; }

        .input-group { margin-bottom: 1rem; }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: var(--label-color);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            color: var(--input-text);
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: #3d9dfc;
            outline: none;
        }

        button.analyze-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #3d9dfc, #2a75c7);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button.analyze-btn:hover { box-shadow: 0 4px 12px rgba(61, 157, 252, 0.4); }
        button.analyze-btn:active { transform: scale(0.98); }

        
        #result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            text-align: center;
            animation: fadeIn 0.5s;
        }

        .status-normal {
            background-color: rgba(0, 200, 81, 0.15);
            border: 1px solid #00c851;
            color: #007E33; 
        }
        
        .dark-mode .status-normal { color: #00c851; }

        .status-attack {
            background-color: rgba(255, 68, 68, 0.15);
            border: 1px solid #ff4444;
            color: #CC0000; 
            animation: pulse 1.5s infinite;
        }
        
        .dark-mode .status-attack { color: #ff4444; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); } }

        .footer { margin-top: 20px; font-size: 0.8rem; color: var(--label-color); text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
        🌓
    </button>

    <h2>🚗 Automotive IDS</h2>
    <p style="text-align: center; font-size: 0.9rem; color: var(--label-color); margin-bottom: 25px;">
        Ethernet Intrusion Detection System
    </p>

    <div class="input-group">
        <label>⏱️ DeltaTime (seconds)</label>
        <input type="number" id="deltaTime" step="0.0001" placeholder="e.g. 0.05">
    </div>

    <div class="input-group">
        <label>📦 Packet Length (bytes)</label>
        <input type="number" id="length" placeholder="e.g. 60">
    </div>

    <div class="input-group">
        <label>🌐 Protocol ID</label>
        <input type="number" id="protocol" placeholder="e.g. 6 (TCP) or 17 (UDP)">
    </div>

    <button class="analyze-btn" onclick="sendData()">🔍 ANALYZE PACKET</button>

    <div id="result-box"></div>

    <div class="footer">
        DEVRAN DUMAN
    </div>
</div>

<script>
    
    function toggleTheme() {
        document.body.classList.toggle("dark-mode");
    }

    
    async function sendData() {
        const resultBox = document.getElementById("result-box");
        
        resultBox.style.display = "block";
        resultBox.className = ""; 
        resultBox.style.backgroundColor = "transparent";
        resultBox.style.border = "none";
        resultBox.style.color = "var(--text-color)";
        resultBox.innerHTML = "🔄 Processing traffic data...";

        const data = {
            "DeltaTime": parseFloat(document.getElementById("deltaTime").value),
            "Length": parseInt(document.getElementById("length").value),
            "Protocol": parseInt(document.getElementById("protocol").value)
        };

        if (isNaN(data.DeltaTime) || isNaN(data.Length) || isNaN(data.Protocol)) {
            resultBox.innerHTML = "⚠️ Please fill all fields with numbers.";
            resultBox.style.color = "#ffbb33";
            return;
        }

        try {
            const response = await fetch("http://127.0.0.1:8000/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            if (!response.ok) throw new Error("Server Error");

            const result = await response.json();

            
            if (result.result === "Attack") {
                resultBox.className = "status-attack";
                resultBox.innerHTML = `
                    <h3 style="margin:0">🚨 ATTACK DETECTED!</h3>
                    <p style="margin: 5px 0 10px 0;">Action Required Immediately.</p>
                    <small>Log ID: #${result.log_id}</small>
                `;
            } else {
                resultBox.className = "status-normal";
                resultBox.innerHTML = `
                    <h3 style="margin:0">🛡️ NORMAL TRAFFIC</h3>
                    <p style="margin: 5px 0 10px 0;">Traffic is safe.</p>
                    <small>Log ID: #${result.log_id}</small>
                `;
            }

        } catch (error) {
            resultBox.innerHTML = "❌ Connection Error. Backend not running.";
            resultBox.style.color = "#ff4444";
        }
    }
</script>

</body>
</html>
